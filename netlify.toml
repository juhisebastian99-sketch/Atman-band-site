[build]
  base = "."
  publish = "frontend/build"
  command = "cd frontend && yarn install && yarn build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Public site fallback for React Router (SPA) — MUST be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
