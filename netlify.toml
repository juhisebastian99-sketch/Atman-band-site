[build]
  base = "."
  publish = "frontend/build"
  command = "cd netlify/functions && yarn install && cd ../.. && cd frontend && yarn install && yarn build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"

[functions]
  directory = "netlify/functions"

# --- API routes -> Netlify Functions (MUST come before SPA catchall) ---
[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/me"
  to = "/.netlify/functions/admin-me"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/bookings"
  to = "/.netlify/functions/admin-bookings"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/settings"
  to = "/.netlify/functions/settings"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/videos"
  to = "/.netlify/functions/videos"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/videos/*"
  to = "/.netlify/functions/videos"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/shows"
  to = "/.netlify/functions/shows"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/shows/*"
  to = "/.netlify/functions/shows"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/gallery"
  to = "/.netlify/functions/gallery"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/gallery/*"
  to = "/.netlify/functions/gallery"
  status = 200
  force = true

[[redirects]]
  from = "/api/settings"
  to = "/.netlify/functions/settings"
  status = 200
  force = true

[[redirects]]
  from = "/api/videos"
  to = "/.netlify/functions/videos"
  status = 200
  force = true

[[redirects]]
  from = "/api/shows"
  to = "/.netlify/functions/shows"
  status = 200
  force = true

[[redirects]]
  from = "/api/gallery"
  to = "/.netlify/functions/gallery"
  status = 200
  force = true

[[redirects]]
  from = "/api/bookings"
  to = "/.netlify/functions/bookings"
  status = 200
  force = true

# --- SPA fallback (MUST be last) ---
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
